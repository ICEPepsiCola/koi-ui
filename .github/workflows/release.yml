name: Release

# 自动：push main → semantic-release 按 Conventional Commits 定版
# 手动：Actions → Release → Run workflow → 选 bump（auto / patch / minor / major）
# 手动与自动走同一套 semantic-release；手动仅可强制主/次/修订级别
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (auto = from commits)'
        required: true
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm push:check

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.bump != 'auto' && inputs.bump || '' }}
        run: pnpm exec semantic-release
